<!DOCTYPE html>
<html>
    <head>
        <title>Reservation</title>
        
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Signup form for users">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="bo">
        <h1 class="re">Reserve a table</h1>
        <form method="POST">
        <div id="fn">
            <label for="firstname">Firstname</label><br>
            <input type="text" id="firstname" name="firstname" placeholder="Enter your Firstname..." required maxlength="20">

        </div>
        <div>
            <label for="lastname">Lastname</label><br>
            <input type="text" id="lastname" name="lastname" placeholder="Enter your Lastname..." required maxlength="20">

        </div>
        <div>
            <label for="peron">No of persons</label><br>
            <input type="text" id="peron" name="email" placeholder="Enter number of persons.." required  >
        </div>
        
        <div>
            <label for="date">Date of reservation</label><br>
            <input type="date" id="date" name="date" required>
        </div>
        




        <div>
            <button type="submit" id="signup-btn">
                Reserve
            </button>
        </div>
        </form>
        
        
    </body>




</html>
